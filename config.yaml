llm:
  provider: ollama 
  model_name: llama3.2
  ollama_url: http://localhost:11434/api/generate
  ollama_tags_url: http://localhost:11434/api/tags

  batch_size: 100 # Number of sentences to process in one batch. Adjust based on your system's capabilities and API limits.
  max_workers: 4 # Number of parallel workers for LLM processing. Adjust based on your system's CPU cores and API limits.
  request_timeout: 120 # Timeout for LLM API requests in seconds. Adjust based on expected response times and network conditions.

  options:
    temperature: 0.0 # Set to 0 for deterministic output, which is important for classification tasks. Adjust if you want more creative responses, but it may reduce consistency.
    top_p: 1.0 # Set to 1.0 to consider all tokens, which is important for classification tasks. Adjust if you want to limit the token pool, but it may reduce accuracy.
    top_k: 20 # Set to a reasonable number to limit the token pool while still allowing for accurate classification. Adjust based on your model's vocabulary and expected output.
    repeat_penalty: 1.0 # Set to 1.0 to allow repetition, which can be important for classification tasks. Adjust if you want to discourage repetition, but it may reduce accuracy.
    num_predict: 80 # Set to a reasonable number to limit the output length. Adjust based on your model's capabilities and expected output.

  prompts:
    metaphor_prompt_path: Prompts/metaphor_classification_v1.txt
    stance_prompt_path: Prompts/stance_classification_v1.txt

summary_llm:
  provider: ollama
  model_name: llama3.2
  ollama_url: http://localhost:11434/api/generate
  ollama_tags_url: http://localhost:11434/api/tags

  request_timeout: 180
  max_retries: 2
  retry_backoff_seconds: 1.0

  options:
    temperature: 0.0
    top_p: 1.0
    top_k: 20
    repeat_penalty: 1.0
    num_predict: 250

  weekly:
    top_n_examples: 10
    min_examples_for_summary: 3
    prompt_path: Prompts/weekly_llm_summary_v1.txt

  monthly:
    min_weekly_summaries: 2
    prompt_path: Prompts/monthly_llm_summary_v1.txt

  yearly:
    min_monthly_summaries: 2
    prompt_path: Prompts/yearly_llm_summary_v1.txt

  volume_shift:
    enabled: true
    min_pct_change: 30
    min_absolute_change: 25
    top_n_examples: 10
    prompt_path: Prompts/volume_shift_summary_v1.txt