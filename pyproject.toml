[project]
name = "framescope"
version = "0.1.0"
description = "Pipeline for collecting, labeling, and analyzing AI metaphor framing and stance in Reddit discourse."
requires-python = ">=3.9"

dependencies = [
    "requests",
    "pandas",
    "numpy",
    "matplotlib",
    "openai",
    "python-dotenv",
    "pyyaml",
    "scikit-learn",
    "tqdm",
    "spacy"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["Framescope*"]